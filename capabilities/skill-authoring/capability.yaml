name: skill-authoring
type: skill
portability:
  level: official-preferred
description: >
  Create portable Agent Skills while preferring vendor-native skill creators when available.
canonical:
  skill: skills/skill-authoring/SKILL.md
  prompts:
    - prompts/create-agent-skill.md
official_preferred:
  claude: "Use Claude native skill creation guidance or built-in skill creator when available."
  codex: "Prefer Codex built-in $skill-creator when available."
  gemini: "Use Gemini built-in skill creator when available."
targets:
  claude:
    mode: official-preferred
    output: .claude/skills/skill-authoring/SKILL.md
    adapter: vendors/claude.md
  codex:
    mode: official-preferred
    output: .agents/skills/skill-authoring/SKILL.md
    adapter: vendors/codex.md
  gemini:
    mode: official-preferred
    output: .agents/skills/skill-authoring/SKILL.md
    adapter: vendors/gemini.md
  opencode:
    mode: generated-skill
    output: .agents/skills/skill-authoring/SKILL.md
    adapter: vendors/opencode.md
fallback:
  prompt: prompts/create-agent-skill.md
